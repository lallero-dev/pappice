<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pemmece</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">P</span>
        <div>
          <strong>Pemmece</strong>
          <span>customer support</span>
        </div>
      </div>
      <nav class="topnav" id="topNav" hidden>
        <button class="nav-button active" id="issuesTab" type="button">Tickets</button>
        <button class="nav-button" id="projectTab" type="button">Product</button>
      </nav>
      <div class="topbar-actions">
        <button class="nav-button topbar-admin-button" id="adminTab" type="button" hidden>Admin</button>
        <div class="profile-menu" id="profileMenu" hidden>
          <button class="profile-button" id="profileButton" type="button" aria-haspopup="menu" aria-expanded="false">
            <span class="profile-avatar" id="profileAvatar">P</span>
            <span class="profile-label">
              <strong id="profileName"></strong>
              <span id="profileRole"></span>
            </span>
          </button>
          <div class="profile-popover" id="profilePopover" role="menu" hidden>
            <div class="profile-summary">
              <strong id="profileMenuName"></strong>
              <span id="profileEmail"></span>
            </div>
            <button class="profile-menu-item" id="profileEditButton" type="button" role="menuitem">Profile</button>
            <button class="profile-menu-item" id="changePasswordButton" type="button" role="menuitem">Change Password</button>
            <button class="profile-menu-item" id="logoutButton" type="button" role="menuitem">Logout</button>
          </div>
        </div>
      </div>
    </header>

    <section class="auth-wrap" id="authView" hidden>
      <form class="auth-panel" id="setupForm">
        <h1>Set Up Pemmece</h1>
        <label>
          Username
          <input name="username" required minlength="3" maxlength="48" autocomplete="username">
        </label>
        <label>
          Display name
          <input name="display_name" autocomplete="name">
        </label>
        <label>
          Email
          <input name="email" type="email" autocomplete="email">
        </label>
        <label>
          Password
          <input name="password" required minlength="8" type="password" autocomplete="new-password">
        </label>
        <button class="primary-button" type="submit">Create Admin</button>
      </form>

      <form class="auth-panel" id="loginForm">
        <h1>Sign In</h1>
        <label>
          Username
          <input name="username" required autocomplete="username">
        </label>
        <label>
          Password
          <input name="password" required type="password" autocomplete="current-password">
        </label>
        <button class="primary-button" type="submit">Sign In</button>
      </form>

      <form class="auth-panel" id="accountLinkForm" hidden>
        <h1 id="accountLinkTitle">Set Password</h1>
        <p class="auth-note" id="accountLinkHelp">Enter a password to finish account setup.</p>
        <div class="account-summary" id="accountLinkUser"></div>
        <label>
          Password
          <input name="password" required minlength="8" type="password" autocomplete="new-password">
        </label>
        <button class="primary-button" id="accountLinkSubmit" type="submit">Set Password</button>
      </form>
    </section>

    <main class="shell" id="appView" hidden>
      <section class="workspace" id="issueView">
        <div class="toolbar">
          <div class="filter-control">
            <label for="searchInput">Search</label>
            <input id="searchInput" type="search" autocomplete="off" placeholder="title, requester, description">
          </div>
          <div class="filter-control">
            <label>Status</label>
            <div class="status-filter-list" id="statusFilterList" aria-label="Status filters"></div>
          </div>
          <div class="filter-control">
            <label for="productFilter">Product</label>
            <select id="productFilter"></select>
          </div>
          <div class="filter-control">
            <label for="assigneeFilter">Assignee</label>
            <select id="assigneeFilter"></select>
          </div>
          <div class="toolbar-actions">
            <button class="primary-button" id="newIssueButton" type="button" hidden>New Ticket</button>
          </div>
        </div>

        <div class="content-grid">
          <section class="issue-pane" aria-label="Tickets">
            <div class="table-head">
              <button class="sort-header" type="button" data-sort-key="created_at">Created</button>
              <button class="sort-header" type="button" data-sort-key="product">Product</button>
              <button class="sort-header" type="button" data-sort-key="title">Ticket</button>
              <button class="sort-header" type="button" data-sort-key="status">Status</button>
              <button class="sort-header" type="button" data-sort-key="priority">Priority</button>
              <button class="sort-header" type="button" data-sort-key="updated_at">Updated</button>
            </div>
            <div class="issue-list" id="issueList"></div>
          </section>
        </div>
      </section>

      <section class="admin-view" id="adminView" hidden>
        <div class="admin-grid">
          <section class="admin-panel">
            <div class="panel-head">
              <h2>Products</h2>
              <button class="ghost-button" id="addProjectButton" type="button">New</button>
            </div>
            <div class="admin-list" id="projectList"></div>
          </section>

          <section class="admin-panel">
            <div class="panel-head">
              <h2>Staff & Customers</h2>
              <button class="ghost-button" id="addUserButton" type="button">New</button>
            </div>
            <div class="admin-list" id="userList"></div>
          </section>

          <section class="admin-panel">
            <div class="panel-head">
              <h2>API Tokens</h2>
              <button class="ghost-button" id="createTokenButton" type="button">Create</button>
            </div>
            <div class="token-result" id="tokenResult"></div>
            <div class="admin-list" id="tokenList"></div>
          </section>

          <section class="admin-panel">
            <div class="panel-head">
              <h2>Global Webhooks</h2>
              <button class="ghost-button" id="addGlobalWebhookButton" type="button">New</button>
            </div>
            <div class="admin-list" id="globalWebhookList"></div>
          </section>

          <section class="admin-panel">
            <div class="panel-head">
              <h2>Email Outbox</h2>
              <div class="panel-actions">
                <button class="ghost-button" id="sendTestEmailButton" type="button">Send Test</button>
              </div>
            </div>
            <div class="email-overview" id="emailOverview"></div>
            <div class="admin-list" id="emailList"></div>
          </section>
        </div>
      </section>

      <section class="admin-view" id="projectView" hidden>
        <div class="admin-grid">
          <section class="admin-panel">
            <div class="panel-head">
              <h2>Members</h2>
              <button class="ghost-button" id="addMemberButton" type="button">Add</button>
            </div>
            <div class="admin-list" id="memberList"></div>
          </section>

          <section class="admin-panel">
            <div class="panel-head">
              <h2>Product Webhooks</h2>
              <button class="ghost-button" id="addWebhookButton" type="button">New</button>
            </div>
            <div class="admin-list" id="webhookList"></div>
          </section>

          <section class="admin-panel">
            <div class="panel-head">
              <h2>Deliveries</h2>
            </div>
            <div class="admin-list" id="deliveryList"></div>
          </section>
        </div>
      </section>
    </main>

    <template id="emptyTemplate">
      <div class="empty-state">No tickets match this view.</div>
    </template>

    <pm-modal id="modalHost"></pm-modal>

    <script type="module" src="/static/app.js"></script>
  </body>
</html>
