<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pemmece</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">P</span>
        <div>
          <strong>Pemmece</strong>
          <span>customer support</span>
        </div>
      </div>
      <nav class="topnav" id="topNav" hidden>
        <button class="nav-button active" id="issuesTab" type="button">Tickets</button>
        <button class="nav-button" id="projectTab" type="button">Product</button>
        <button class="nav-button" id="adminTab" type="button">Admin</button>
      </nav>
      <div class="topbar-actions">
        <span class="status-pill" id="connectionState">Starting</span>
        <span class="user-pill" id="userLabel" hidden></span>
        <button class="ghost-button" id="refreshButton" type="button" title="Refresh" hidden>Refresh</button>
        <button class="ghost-button" id="logoutButton" type="button" hidden>Logout</button>
        <button class="primary-button" id="newIssueButton" type="button" hidden>New Ticket</button>
      </div>
    </header>

    <section class="auth-wrap" id="authView" hidden>
      <form class="auth-panel" id="setupForm">
        <h1>Set Up Pemmece</h1>
        <label>
          Username
          <input name="username" required minlength="3" maxlength="48" autocomplete="username">
        </label>
        <label>
          Display name
          <input name="display_name" autocomplete="name">
        </label>
        <label>
          Email
          <input name="email" type="email" autocomplete="email">
        </label>
        <label>
          Password
          <input name="password" required minlength="8" type="password" autocomplete="new-password">
        </label>
        <button class="primary-button" type="submit">Create Admin</button>
      </form>

      <form class="auth-panel" id="loginForm">
        <h1>Sign In</h1>
        <label>
          Username
          <input name="username" required autocomplete="username">
        </label>
        <label>
          Password
          <input name="password" required type="password" autocomplete="current-password">
        </label>
        <button class="primary-button" type="submit">Sign In</button>
      </form>
    </section>

    <main class="shell" id="appView" hidden>
      <aside class="sidebar">
        <section class="filter-section project-picker">
          <label for="projectFilter">Product</label>
          <select id="projectFilter">
            <option value="">All products</option>
          </select>
        </section>

        <section class="summary-grid" aria-label="Ticket summary">
          <button class="metric active" data-filter-status="">
            <span class="metric-value" id="countAll">0</span>
            <span class="metric-label">All</span>
          </button>
          <button class="metric" data-filter-status="new">
            <span class="metric-value" id="countNew">0</span>
            <span class="metric-label">New</span>
          </button>
          <button class="metric" data-filter-status="assigned">
            <span class="metric-value" id="countAssigned">0</span>
            <span class="metric-label">Assigned</span>
          </button>
          <button class="metric" data-filter-status="resolved">
            <span class="metric-value" id="countResolved">0</span>
            <span class="metric-label">Resolved</span>
          </button>
        </section>

        <section class="filter-section">
          <label for="assigneeFilter">Assignee</label>
          <input id="assigneeFilter" type="search" autocomplete="off" placeholder="anyone">
        </section>
      </aside>

      <section class="workspace" id="issueView">
        <div class="toolbar">
          <div class="search-box">
            <label for="searchInput">Search</label>
            <input id="searchInput" type="search" autocomplete="off" placeholder="title, tag, description">
          </div>
        </div>

        <div class="content-grid">
          <section class="issue-pane" aria-label="Tickets">
            <div class="table-head">
              <span>ID</span>
              <span>Ticket</span>
              <span>Status</span>
              <span>Priority</span>
              <span>Updated</span>
            </div>
            <div class="issue-list" id="issueList"></div>
          </section>
        </div>
      </section>

      <section class="admin-view" id="adminView" hidden>
        <div class="admin-grid">
          <section class="admin-panel">
            <div class="panel-head">
              <h2>Products</h2>
              <button class="ghost-button" id="addProjectButton" type="button">New</button>
            </div>
            <div class="admin-list" id="projectList"></div>
          </section>

          <section class="admin-panel">
            <div class="panel-head">
              <h2>Staff & Customers</h2>
              <button class="ghost-button" id="addUserButton" type="button">New</button>
            </div>
            <div class="admin-list" id="userList"></div>
          </section>

          <section class="admin-panel">
            <div class="panel-head">
              <h2>API Tokens</h2>
              <button class="ghost-button" id="createTokenButton" type="button">Create</button>
            </div>
            <div class="token-result" id="tokenResult"></div>
            <div class="admin-list" id="tokenList"></div>
          </section>

          <section class="admin-panel">
            <div class="panel-head">
              <h2>Global Webhooks</h2>
              <button class="ghost-button" id="addGlobalWebhookButton" type="button">New</button>
            </div>
            <div class="admin-list" id="globalWebhookList"></div>
          </section>

          <section class="admin-panel">
            <div class="panel-head">
              <h2>Email Outbox</h2>
            </div>
            <div class="admin-list" id="emailList"></div>
          </section>
        </div>
      </section>

      <section class="admin-view" id="projectView" hidden>
        <div class="admin-grid">
          <section class="admin-panel">
            <div class="panel-head">
              <h2>Members</h2>
              <button class="ghost-button" id="addMemberButton" type="button">Add</button>
            </div>
            <div class="admin-list" id="memberList"></div>
          </section>

          <section class="admin-panel">
            <div class="panel-head">
              <h2>Product Webhooks</h2>
              <button class="ghost-button" id="addWebhookButton" type="button">New</button>
            </div>
            <div class="admin-list" id="webhookList"></div>
          </section>

          <section class="admin-panel">
            <div class="panel-head">
              <h2>Deliveries</h2>
            </div>
            <div class="admin-list" id="deliveryList"></div>
          </section>
        </div>
      </section>
    </main>

    <template id="emptyTemplate">
      <div class="empty-state">No tickets match this view.</div>
    </template>

    <pm-modal id="modalHost"></pm-modal>

    <script type="module" src="/static/app.js"></script>
  </body>
</html>
